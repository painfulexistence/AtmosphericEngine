name: Build (WebAssembly)

# Validates that AtmosLua links successfully as a WebAssembly module.
# A successful link catches the majority of WebGL-specific failures:
#   - Missing -sUSE_GLFW / -sFETCH / -sFULL_ES3 flags
#   - GLSL version mismatches discovered at shader-compile time (runtime)
#   - WASM-incompatible dependencies (x86 archives, system glad, etc.)
#   - Emscripten-incompatible C++ (non-portable intrinsics, POSIX-only APIs)
#
# The build artifact (.html + .wasm + .js + .data) is uploaded so that
# manual smoke-testing in a browser is possible without a local emsdk install.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Keep in sync with scripts/check-emscripten-version.sh
env:
  EMSDK_VERSION: "4.0.10"

jobs:
  build-wasm-webgl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          sparse-checkout: |
            AtmosphericEngine
            cmake
            frontends
            Example_HelloWorld
            Example_VoxelWorld
            Example_Physics2D
            Example_CSB
            Example_MidnightSkyraiders
            Example_RPG
            CMakeLists.txt
            CMakePresets.json
            vcpkg.json

      # ── Emscripten SDK ─────────────────────────────────────────────────────
      # EMSDK env var is exported automatically and is read by CMakeLists.txt:
      #   set(VCPKG_CHAINLOAD_TOOLCHAIN_FILE $ENV{EMSDK}/upstream/emscripten/cmake/…)
      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-${{ env.EMSDK_VERSION }}

      # ── System tools ───────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build pkg-config

      # ── vcpkg ──────────────────────────────────────────────────────────────
      - name: Check out vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      # Cache installed packages keyed on vcpkg.json so a lockfile change
      # triggers a full rebuild, but unchanged deps reuse the cache.
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/packages
          key: vcpkg-wasm32-emscripten-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-wasm32-emscripten-

      # ── Configure ──────────────────────────────────────────────────────────
      # Emscripten builds use GLFW (-sUSE_GLFW=3) from the Emscripten sysroot;
      # SDL3 is native-only. AE_USE_BASIS_UNIVERSAL is auto-enabled by CMake
      # when EMSCRIPTEN is detected (see root CMakeLists.txt).
      - name: CMake Configure
        run: >
          cmake -G Ninja
          -B ${{ github.workspace }}/build
          -S ${{ github.workspace }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=wasm32-emscripten
          -DCMAKE_BUILD_TYPE=MinSizeRel

      # ── Build ──────────────────────────────────────────────────────────────
      - name: CMake Build (All Targets)
        run: cmake --build ${{ github.workspace }}/build --parallel

      # ── Artifact upload ────────────────────────────────────────────────────
      - name: Upload WebAssembly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helloworld-wasm-${{ github.sha }}
          path: ${{ github.workspace }}/build/HelloWorld/
          if-no-files-found: error
          retention-days: 30

  # ── WebGPU compile check (non-blocking) ──────────────────────────────────
  # Verifies that AE_USE_WEBGPU=ON compiles cleanly with emdawnwebgpu.
  # The WebGPU backend is still WIP so failures here do not block merging.
  build-wam-webgpu:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          sparse-checkout: |
            AtmosphericEngine
            cmake
            frontends
            Example_HelloWorld
            Example_VoxelWorld
            Example_Physics2D
            Example_CSB
            Example_MidnightSkyraiders
            Example_RPG
            CMakeLists.txt
            CMakePresets.json
            vcpkg.json

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: emsdk-${{ env.EMSDK_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build pkg-config

      - name: Check out vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/installed
            ${{ github.workspace }}/vcpkg/packages
          key: vcpkg-wasm32-emscripten-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-wasm32-emscripten-

      - name: CMake Configure (WebGPU)
        run: >
          cmake -G Ninja
          -B ${{ github.workspace }}/build
          -S ${{ github.workspace }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=wasm32-emscripten
          -DCMAKE_BUILD_TYPE=MinSizeRel
          -DAE_USE_WEBGPU=ON

      - name: CMake Build (WebGPU)
        run: cmake --build ${{ github.workspace }}/build --parallel
