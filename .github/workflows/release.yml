name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Environment
        run: |
          brew install cmake ninja

      - name: Install vcpkg
        uses: actions/checkout@v4
        with:
          repository: "microsoft/vcpkg"
          path: "vcpkg-source"

      - name: Bootstrap vcpkg
        run: |
          ./vcpkg-source/bootstrap-vcpkg.sh

      - name: CMake Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_TOOLCHAIN_FILE=vcpkg-source/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -S .

      - name: CMake Build
        run: cmake --build build

      - name: Package Starter Kit
        run: |
          TAG_NAME=${{ github.ref_name }}
          PACKAGE_NAME="AtmosphericEngine-Starter-${TAG_NAME}"
          
          zip -r "${PACKAGE_NAME}.zip" . \
            -x "*.git*" \
            -x "build/*" \
            -x ".cache/*" \
            -x ".devcontainer/*" \
            -x "*.DS_Store" \
            -x ".vscode/*" \
            -x "vcpkg/*" \
            -x "DEVLOG.md" \
            -x "AtmosphericEngine/build/*" \
            -x "AtmosphericEngine/CMakeFiles/*"

          mkdir -p dist
          mv "${PACKAGE_NAME}.zip" dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
